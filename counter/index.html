<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>baby's first counter</title>
    <link rel="stylesheet" href="/global_assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <!-- TODO: styles too lol, make a TUI-styled thing, with keyboard select for button -->
</head>
<body>
    <!-- TODO: box from the neopronouns page lol -->
    <div>
        <code class="font_jbmono">
            <span class="shell_user">guest@web</span>:<span class="shell_path">/<span id="path_loc" class="shell_path"></span></span>$ <span class="shell_command">./counter.sh</span>
        </code>
    </div>
    <samp class="font_jbmono">
        <p id="counter_display"></p>
        <button onclick="modifyCountVal(1)" id="add_btn">+1</button>
        <button onclick="modifyCountVal(-1)" id="sub_btn">-1</button>
    </samp>
    <script>
        const DISPLAY = document.querySelector("#counter_display");
        let count = 0;

        function modifyCountVal(amt) {
            count = Math.max(0, count + amt);
            updateRenderState();
        }

        function updateRenderState() {
            DISPLAY.innerHTML = `yeet ${count}`;
        }

        // init
        updateRenderState();

        // TODO: separate this into a function
        // FIXME: this has trailing paths
        const PATH_DECORATOR = document.querySelector("#path_loc");
        PATH_DECORATOR.innerHTML = window.location.pathname.slice(1, window.location.pathname.length - 1);
    </script>
</body>
</html>
