<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>baby's first counter</title>
    <link rel="stylesheet" href="/global_assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <!-- TODO: styles too lol, make a TUI-styled thing, with keyboard select for button -->
</head>
<body>
    <div>
        <code class="font_jbmono">
            <span class="shell_user">guest@web</span>:<span class="shell_path">/<span id="path_loc" class="shell_path"></span></span>$ <span class="shell_command">./counter.sh</span>
        </code>
    </div>
    <samp class="font_jbmono">
        <p id="counter_display"></p>
        <button class="btn_element font_jbmono" onclick="modifyCountVal(1)" id="add_btn">+1</button>
        <button class="btn_element font_jbmono" onclick="modifyCountVal(-1)" id="sub_btn">-1</button>
        <button class="btn_element font_jbmono" onclick="resetCounter()" id="sub_btn">Reset</button>
    </samp>
    <script>
        // TODO: check if trying to decrement to minus, then set remarks!
        const DISPLAY = document.querySelector("#counter_display");
        const DEFAULT = 0;
        let count = DEFAULT;

        function modifyCountVal(amt) {
            count = Math.max(0, count + amt);
            updateRenderState();
        }

        function resetCounter() {
            count = DEFAULT;
            updateRenderState();
        }

        function updateRenderState() {
            let buf = `Counter currently at ${count}`;
            let remarks = "";
            switch (count) {
                case 69:
                    remarks = ` (nice)`;
                    break;
            }
            DISPLAY.innerHTML = `${buf}${remarks}`;
        }

        // init
        updateRenderState();

        // TODO: separate this into a function
        // FIXME: this has trailing paths
        const PATH_DECORATOR = document.querySelector("#path_loc");
        PATH_DECORATOR.innerHTML = window.location.pathname.slice(1, window.location.pathname.length - 1);
    </script>
</body>
</html>
